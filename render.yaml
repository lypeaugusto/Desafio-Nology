services:
  - type: web
    name: cashback-api
    runtime: python3.11
    rootDir: backend
    buildCommand: pip install -r requirements.txt && cd ../frontend && npm install && npm run build && rm -rf ../static/* && cp -r dist/* ../static/
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        scope: build
        sync: false
      - key: DATABASE_URL
        scope: runtime
        sync: false
    autoDeploy: true
